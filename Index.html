<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Japan Drive 2026 | V17 UltraSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        :root { --bg-cream: #F9F7F2; --accent-red: #8E2D4F; --text-main: #4A3F3F; }
        body { background-color: var(--bg-cream); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; overflow-x: hidden; }
        .serif { font-family: 'Noto Serif JP', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 增加景點間距以利於同步監測 */
        .timeline-line { position: absolute; left: 50px; top: 0; bottom: 0; width: 1px; background: #E5E1D8; z-index: 0; }
        .event-card { 
            position: relative; z-index: 10; padding-left: 65px; 
            margin-bottom: 60px; /* 增加到 60px 確保 iPhone Pro 滾動感測準確 */
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            opacity: 0.2; transform: scale(0.96);
        }
        .event-card.is-active { opacity: 1; transform: scale(1); }
        .event-time { position: absolute; left: 0; width: 45px; text-align: right; font-size: 15px; font-weight: 900; color: #ccc; transition: 0.3s; }
        .is-active .event-time { color: var(--accent-red); font-size: 18px; }

        /* 懸浮狀態列 - 底部安全區域適配 */
        .floating-status { 
            position: fixed; bottom: calc(85px + env(safe-area-inset-bottom)); left: 15px; right: 15px; 
            background: rgba(255,255,255,0.98); backdrop-filter: blur(30px); 
            border-radius: 20px; box-shadow: 0 12px 35px rgba(0,0,0,0.1); 
            display: flex; align-items: center; padding: 14px 18px; z-index: 1000; 
            border: 0.5px solid rgba(0,0,0,0.05);
            transition: transform 0.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .floating-status:active { transform: scale(0.95); }

        /* 下拉彈窗手勢容器 */
        .modal-content { transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .dragging { transition: none !important; }

        /* 導航標籤 */
        .tab-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 0.5px solid #eee; display: flex; justify-content: space-around; padding: 14px 0 calc(12px + env(safe-area-inset-bottom)); z-index: 1001; }
        .tag-must { background: var(--accent-red); color: white; padding: 1px 5px; border-radius: 4px; font-size: 9px; font-weight: 900; }
    </style>
</head>
<body x-data="travelApp()" x-init="initApp()" @scroll.window.throttle.10ms="syncStatus()">

    <!-- TAB 1: 行程主頁 -->
    <div x-show="activeTab === 'itinerary'" x-cloak>
        <header class="pt-12 px-8 text-center sticky top-0 bg-[#F9F7F2]/95 backdrop-blur-md z-[50]">
            <h1 class="serif text-xl font-black mb-4">四國九州自駕 2026</h1>
            <div class="flex overflow-x-auto space-x-3 py-2 no-scrollbar">
                <template x-for="(day, index) in itinerary" :key="index">
                    <div @click="changeDay(index)" class="min-w-[50px] h-[50px] rounded-xl flex flex-col items-center justify-center cursor-pointer transition-all" :class="currentDay === index ? 'bg-white shadow-md font-bold' : 'opacity-20'">
                        <span class="text-[8px] uppercase font-black" x-text="day.week"></span>
                        <span class="text-base serif font-black" x-text="day.dateNum"></span>
                    </div>
                </template>
            </div>
        </header>

        <!-- 當天天氣 -->
        <div class="mx-8 my-4 px-5 py-3 bg-white/60 rounded-2xl flex justify-between items-center border border-white/80">
            <div class="flex items-center">
                <i class="fas fa-location-dot mr-3 text-[#8E2D4F]"></i>
                <span class="text-[10px] font-black uppercase tracking-widest" x-text="itinerary[currentDay].city"></span>
            </div>
            <div class="flex items-center text-orange-600 font-black">
                <span class="text-xs mr-3" x-text="itinerary[currentDay].weatherLabel"></span>
                <span class="serif text-sm" x-text="itinerary[currentDay].temp"></span>
            </div>
        </div>

        <main class="relative px-8 pt-6 pb-96">
            <div class="timeline-line"></div>
            <!-- 景點列表 -->
            <template x-for="(event, eIdx) in itinerary[currentDay].events" :key="eIdx">
                <div :id="'event-'+eIdx" 
                     class="event-card js-event-item" 
                     :class="activeEventIndex === eIdx ? 'is-active' : ''"
                     @click="openEvent(event)">
                    <div class="event-time serif font-black">
                        <span x-text="event.time"></span><span class="text-[9px] align-top">°</span>
                    </div>
                    <div class="flex items-center space-x-2 mb-1">
                        <span class="text-[7px] font-black opacity-30 uppercase tracking-widest" x-text="event.type"></span>
                        <template x-if="event.booked"><span class="bg-blue-600 text-white text-[7px] px-1.5 rounded-sm font-bold">予約済</span></template>
                    </div>
                    <h4 class="serif text-base leading-tight mb-1 font-bold" x-text="event.title"></h4>
                    <p class="text-[10px] opacity-60 leading-relaxed line-clamp-2" x-html="event.desc"></p>
                    <template x-if="event.must">
                        <div class="mt-2"><span class="tag-must mr-2">必食</span><span class="text-[10px] font-bold text-[#8E2D4F]" x-text="event.must"></span></div>
                    </template>
                </div>
            </template>
        </main>

        <!-- 懸浮同步狀態欄 -->
        <div class="floating-status" @click="openCurrentEvent()">
            <div class="pr-4 border-r border-gray-100 flex items-center">
                <i class="fas fa-location-arrow text-[#8E2D4F] text-lg animate-pulse"></i>
            </div>
            <div class="flex-1 px-5 overflow-hidden">
                <div class="flex items-center space-x-2">
                    <span class="text-lg font-black serif" x-text="itinerary[currentDay].events[activeEventIndex].time"></span>
                    <span class="text-[8px] font-black text-blue-500 uppercase tracking-widest">Live Sync</span>
                </div>
                <div class="text-[12px] font-black truncate serif" x-text="itinerary[currentDay].events[activeEventIndex].title"></div>
            </div>
            <i class="fas fa-chevron-right text-gray-200 text-xs"></i>
        </div>
    </div>

    <!-- TAB 2: 記帳 -->
    <div x-show="activeTab === 'expenses'" class="p-10 pt-20" x-cloak>
        <h2 class="serif text-2xl font-black mb-6">旅費記帳</h2>
        <div class="bg-[#4A3F3F] p-6 rounded-3xl text-white shadow-xl mb-8">
            <p class="text-[9px] opacity-40 mb-1 uppercase font-black">Estimated HKD</p>
            <h3 class="text-4xl font-black serif">HK$ <span x-text="totalHKD"></span></h3>
            <p class="mt-4 text-[8px] opacity-30">當日匯率: 1 JPY = <span x-text="rate"></span> HKD</p>
        </div>
        <div class="bg-white p-5 rounded-2xl space-y-3 mb-6">
            <input type="text" x-model="newExpName" placeholder="支出項目" class="w-full bg-gray-50 border-none rounded-xl p-3.5 text-xs font-bold">
            <div class="flex space-x-3">
                <input type="number" x-model="newExpAmount" placeholder="¥日圓金額" class="flex-1 bg-gray-50 border-none rounded-xl p-3.5 text-xs font-bold">
                <button @click="addExpense" class="bg-[#8E2D4F] text-white px-6 rounded-xl font-black text-xs">新增</button>
            </div>
        </div>
        <div class="space-y-2">
            <template x-for="(exp, index) in expenses" :key="index">
                <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-xs">
                    <div><h4 class="font-bold text-xs" x-text="exp.name"></h4><p class="text-[8px] opacity-40" x-text="'¥' + exp.jpy + ' → HK$' + (exp.jpy * rate).toFixed(1)"></p></div>
                    <button @click="deleteExpense(index)" class="text-red-200"><i class="fas fa-trash-alt"></i></button>
                </div>
            </template>
        </div>
    </div>

    <!-- TAB 3: 航班 -->
    <div x-show="activeTab === 'flights'" class="p-10 pt-20" x-cloak>
        <h2 class="serif text-2xl font-black mb-8">航班詳情</h2>
        <div class="space-y-4">
            <template x-for="f in flights" :key="f.no">
                <div class="bg-white rounded-2xl p-5 border-l-4 border-[#8E2D4F] flex justify-between items-center shadow-sm">
                    <div><span class="text-[8px] opacity-30 block" x-text="f.date"></span><span class="text-xs font-black" x-text="f.no"></span></div>
                    <div class="flex items-center space-x-6">
                        <div class="text-center"><h4 class="text-sm font-black serif" x-text="f.from"></h4><p class="text-[8px] opacity-40" x-text="f.depTime"></p></div>
                        <i class="fas fa-plane text-gray-100"></i>
                        <div class="text-center"><h4 class="text-sm font-black serif" x-text="f.to"></h4><p class="text-[8px] opacity-40" x-text="f.arrTime"></p></div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- 詳情/地圖彈窗 (下拉手勢優化版) -->
    <div x-show="modalOpen" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-y-full" x-transition:leave="transition ease-in duration-200" x-transition:leave-end="translate-y-full" x-cloak class="fixed inset-0 z-[2000] flex items-end">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="modalOpen = false"></div>
        <div id="modal-body" 
             class="modal-content relative bg-white w-full rounded-t-[40px] p-8 max-h-[92vh] overflow-y-auto shadow-2xl" 
             :class="isDragging ? 'dragging' : ''"
             :style="'transform: translateY(' + translateY + 'px)'"
             @touchstart="touchStart($event)"
             @touchmove="touchMove($event)"
             @touchend="touchEnd($event)">
            
            <div class="w-12 h-1.5 bg-gray-100 rounded-full mx-auto mb-8"></div>
            
            <div class="mb-6">
                <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded uppercase tracking-widest" x-text="activeEvent.type"></span>
                <h2 class="serif text-xl font-black mt-4 leading-tight" x-text="activeEvent.title"></h2>
            </div>
            
            <template x-if="activeEvent.mapCode">
                <div class="mb-6 py-3 px-5 bg-red-50 rounded-2xl border border-dashed border-red-200 flex justify-between items-center">
                    <span class="text-[8px] font-black text-red-800 opacity-40 uppercase">MapCode</span>
                    <span class="font-mono text-sm font-bold text-red-800" x-text="activeEvent.mapCode"></span>
                </div>
            </template>

            <div class="rounded-3xl overflow-hidden h-44 bg-gray-50 mb-6 border border-gray-100 shadow-inner">
                <iframe width="100%" height="100%" frameborder="0" :src="'https://maps.google.com/maps?q=' + encodeURIComponent(activeEvent.title) + '&t=&z=15&ie=UTF8&iwloc=&output=embed'"></iframe>
            </div>

            <div class="bg-[#FDFBFA] rounded-[25px] p-6 mb-8 border border-[#F0E6E1]">
                <div class="flex items-center text-[#8E2D4F] font-black text-[10px] mb-3 uppercase tracking-widest">
                    <i class="fas fa-lightbulb mr-2"></i> 導遊攻略
                </div>
                <div class="text-[12px] leading-loose text-gray-600" x-html="activeEvent.guide || activeEvent.desc"></div>
            </div>

            <a :href="'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(activeEvent.title)" class="block w-full bg-[#4A3F3F] text-white text-center py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl mb-12">啟動 Google Maps 導航</a>
        </div>
    </div>

    <!-- 底部導覽 -->
    <nav class="tab-nav">
        <button @click="activeTab = 'itinerary'" :class="activeTab === 'itinerary' ? 'text-[#8E2D4F]' : 'text-gray-200'"><i class="fas fa-calendar-day text-lg"></i></button>
        <button @click="activeTab = 'expenses'" :class="activeTab === 'expenses' ? 'text-[#8E2D4F]' : 'text-gray-200'"><i class="fas fa-wallet text-lg"></i></button>
        <button @click="activeTab = 'flights'" :class="activeTab === 'flights' ? 'text-[#8E2D4F]' : 'text-gray-200'"><i class="fas fa-plane text-lg"></i></button>
    </nav>

    <script>
        function travelApp() {
            return {
                currentDay: 1,
                activeTab: 'itinerary',
                activeEventIndex: 0,
                modalOpen: false,
                activeEvent: {},
                expenses: JSON.parse(localStorage.getItem('trip_exp_v17') || '[]'),
                newExpName: '',
                newExpAmount: '',
                rate: 0.0518,
                
                // 手勢相關
                startY: 0,
                translateY: 0,
                isDragging: false,

                async initApp() {
                    this.syncStatus(); // 初始同步第一個景點
                    try {
                        const res = await fetch('https://open.er-api.com/v6/latest/JPY');
                        const data = await res.json();
                        if(data.rates.HKD) this.rate = data.rates.HKD.toFixed(4);
                    } catch(e) { console.log('匯率獲取失敗'); }
                },

                // 同步懸浮條景點 - 優化版
                syncStatus() {
                    if (this.activeTab !== 'itinerary') return;
                    const events = this.itinerary[this.currentDay].events;
                    const centerY = window.innerHeight / 2.5; // 設定感應區在螢幕上方 40% 處
                    
                    // 特殊處理：當捲動到最頂部時，強制選定第一個
                    if (window.scrollY < 100) {
                        this.activeEventIndex = 0;
                        return;
                    }

                    // 特殊處理：當捲動到最底部時，強制選定最後一個
                    if ((window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 50)) {
                        this.activeEventIndex = events.length - 1;
                        return;
                    }

                    let closestIdx = this.activeEventIndex;
                    let minDistance = Infinity;

                    events.forEach((_, i) => {
                        const el = document.getElementById('event-' + i);
                        if (el) {
                            const rect = el.getBoundingClientRect();
                            const dist = Math.abs(rect.top - centerY);
                            if (dist < minDistance) {
                                minDistance = dist;
                                closestIdx = i;
                            }
                        }
                    });
                    this.activeEventIndex = closestIdx;
                },

                // 手勢處理：只有在彈窗滾動到頂部時才允許下拉關閉
                touchStart(e) {
                    const modal = document.getElementById('modal-body');
                    if (modal.scrollTop <= 0) {
                        this.startY = e.touches[0].clientY;
                        this.isDragging = true;
                    }
                },
                touchMove(e) {
                    if (!this.isDragging) return;
                    let delta = e.touches[0].clientY - this.startY;
                    if (delta > 0) {
                        e.preventDefault(); // 阻止原生彈跳
                        this.translateY = delta;
                    } else {
                        this.isDragging = false; // 如果向上滑動，交還給原生滾動
                        this.translateY = 0;
                    }
                },
                touchEnd() {
                    if (!this.isDragging) return;
                    this.isDragging = false;
                    if (this.translateY > 150) {
                        this.modalOpen = false;
                    }
                    this.translateY = 0;
                },

                openCurrentEvent() {
                    this.activeEvent = this.itinerary[this.currentDay].events[this.activeEventIndex];
                    this.modalOpen = true;
                },
                changeDay(idx) {
                    this.currentDay = idx;
                    this.activeEventIndex = 0;
                    window.scrollTo(0,0);
                    setTimeout(() => this.syncStatus(), 100);
                },
                openEvent(e) { this.activeEvent = e; this.modalOpen = true; },
                addExpense() {
                    if(!this.newExpName || !this.newExpAmount) return;
                    this.expenses.push({ name: this.newExpName, jpy: parseFloat(this.newExpAmount) });
                    this.newExpName = ''; this.newExpAmount = '';
                    localStorage.setItem('trip_exp_v17', JSON.stringify(this.expenses));
                },
                deleteExpense(i) {
                    this.expenses.splice(i, 1);
                    localStorage.setItem('trip_exp_v17', JSON.stringify(this.expenses));
                },
                get totalHKD() {
                    return this.expenses.reduce((sum, item) => sum + (item.jpy * this.rate), 0).toFixed(1);
                },

                flights: [
                    { no: 'NH1914', date: '28 MAR', from: 'HKG', to: 'HND', depTime: '23:55', arrTime: '04:55' },
                    { no: 'NH531', date: '29 MAR', from: 'HND', to: 'TAK', depTime: '06:55', arrTime: '08:10' },
                    { no: 'NH540', date: '05 APR', from: 'TAK', to: 'HND', depTime: '19:40', arrTime: '21:00' },
                    { no: 'NH813', date: '07 APR', from: 'HND', to: 'HKG', depTime: '01:35', arrTime: '05:15' }
                ],

                itinerary: [
                    { dateNum: '28', week: 'SAT', city: '東京', weatherLabel: '晴', temp: '12-18°C', events: [
                        { time: '23:55', type: 'Flight', title: '全日空 NH1914', desc: '香港直飛羽田機場。' }
                    ]},
                    { dateNum: '29', week: 'SUN', city: '高松/仁淀川', weatherLabel: '晴朗', temp: '15-22°C', events: [
                        { time: '08:00', type: 'Car', title: 'Toyota Rent a Car (TAK)', mapCode: '60 523 045*55', booked: true, guide: '<b>預約號：98172536000</b><br>取車後自駕 3 小時至仁淀川。' },
                        { time: '12:00', type: 'Food', title: '西村商店 (佐川店)', mapCode: '474 200 445*22', must: '草燒鰹魚定食', guide: '在地超人氣名店。' },
                        { time: '13:20', type: 'Spot', title: '仁淀川 Crystal Kayak', mapCode: '474 416 113*60', guide: '<b>1:20pm 預約</b><br>透明獨木舟體驗。' },
                        { time: '15:30', type: 'Spot', title: '上久喜、久喜、引地橋花桃', mapCode: '474 532 234*11', guide: '含ひょうたん桜公園。' },
                        { time: '18:30', type: 'Hotel', title: '星ふるヴィレッジ TENGU', mapCode: '681 448 376*74', guide: 'CI 5pm。山頂觀星飯店。' }
                    ]},
                    { dateNum: '30', week: 'MON', city: '四萬十', weatherLabel: '晴', temp: '13-20°C', events: [
                        { time: '10:00', type: 'Spot', title: '天狗高原 & 白龍湖', mapCode: '681 448 376*74', guide: '<b>白龍湖</b>水色絕美秘境。' },
                        { time: '11:30', type: 'Spot', title: '檮原町 (隈研吾建築)', mapCode: '681 221 445*33', guide: '雲之上圖書館。' },
                        { time: '12:30', type: 'Food', title: 'かざぐるま / くさぶき', guide: '推薦當地蕎麥麵。' },
                        { time: '16:00', type: 'Spot', title: '岩本寺 Supermarket', guide: '<b>⚠️ 9pm 關門</b><br>請在此備足糧食。' },
                        { time: '18:30', type: 'Hotel', title: '岩本寺 (宿坊)', mapCode: '440 439 881*66', guide: 'CI 3pm。' }
                    ]},
                    { dateNum: '31', week: 'TUE', city: '四萬十', weatherLabel: '晴', temp: '14-23°C', events: [
                        { time: '08:30', type: 'Food', title: 'Breakfast: Sotoffice', desc: '河景早餐時光。' },
                        { time: '12:30', type: 'Food', title: '自由軒 本店', mapCode: '440 332 110*00', must: '辛子味噌拉麵' },
                        { time: '15:30', type: 'Food', title: '茶農家的店 あすなろ', mapCode: '440 445 667*88', guide: '<b>⚠️ LO 3:30pm</b>' },
                        { time: '17:00', type: 'Hotel', title: '瀧乃元 近藤家', mapCode: '440 560 123*44', guide: 'CI 4pm。' }
                    ]},
                    { dateNum: '01', week: 'WED', city: '松山', weatherLabel: '晴', temp: '14-21°C', events: [
                        { time: '10:00', type: 'Spot', title: '茶堂公園 (櫻花祭)', guide: '在地賞櫻慶典。' },
                        { time: '11:30', type: 'Spot', title: 'ハタダできたてお菓子館', mapCode: '53 318 445*22', must: '栗タルト' },
                        { time: '13:00', type: 'Food', title: '天天丸 重信店', mapCode: '53 289 112*11' },
                        { time: '15:00', type: 'Spot', title: '道後溫泉散策', guide: '圓滿寺結緣。' },
                        { time: '16:00', type: 'Hotel', title: '山の手別邸 葉隱勒', mapCode: '53 348 012*33', guide: 'CI 4pm。' }
                    ]},
                    { dateNum: '02', week: 'THU', city: '香川', weatherLabel: '晴時多雲', temp: '12-20°C', events: [
                        { time: '12:00', type: 'Spot', title: '雲邊寺山頂公園', mapCode: '337 766 852*17', guide: '天空之鞦韆。' },
                        { time: '16:30', type: 'Spot', title: '紫雲出山 (集合)', mapCode: '757 044 656*44', guide: '<b>⚠️ 16:30 報到</b><br>17:00 領車上山，停留70分。' },
                        { time: '20:30', type: 'Food', title: 'すし遊館あさひ', mapCode: '77 123 445*66', guide: '晚餐名店。' },
                        { time: '22:00', type: 'Hotel', title: 'Guesthouse Ihatov', mapCode: '77 012 334*55', guide: 'CI 10pm。' }
                    ]},
                    { dateNum: '03', week: 'FRI', city: '香川', weatherLabel: '晴', temp: '11-19°C', events: [
