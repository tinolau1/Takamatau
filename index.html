<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>日本櫻花自駕之旅 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        :root { --bg-cream: #F9F7F2; --accent-red: #8E2D4F; --text-main: #4A3F3F; }
        body { background-color: var(--bg-cream); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; overflow-x: hidden; }
        .serif { font-family: 'Noto Serif JP', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 行程動態線條 */
        .timeline-line { position: absolute; left: 50px; top: 0; bottom: 0; width: 1px; background: #E5E1D8; z-index: 0; }
        .event-card { position: relative; z-index: 10; padding-left: 65px; margin-bottom: 70px; transition: all 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); opacity: 0.15; transform: scale(0.96); }
        .event-card.is-active { opacity: 1; transform: scale(1); }
        .event-time { position: absolute; left: 0; width: 45px; text-align: right; font-size: 15px; font-weight: 900; color: #ccc; transition: 0.3s; }
        .is-active .event-time { color: var(--accent-red); font-size: 20px; }

        /* 懸浮狀態列 */
        .floating-status { 
            position: fixed; bottom: calc(100px + env(safe-area-inset-bottom)); left: 16px; right: 16px; 
            background: rgba(255,255,255,0.98); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            display: flex; align-items: center; padding: 16px 20px; z-index: 999; border: 0.5px solid rgba(0,0,0,0.05);
        }

        /* 底部導覽 */
        .tab-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 0.5px solid #eee; display: flex; justify-content: space-around; padding: 14px 0 calc(15px + env(safe-area-inset-bottom)); z-index: 1001; }
        
        /* 詳情彈窗 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 1999; }
        .modal-container { 
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000;
            background: white; border-top-left-radius: 40px; border-top-right-radius: 40px;
            max-height: 94vh; overflow: hidden; display: flex; flex-direction: column;
            will-change: transform; transition: transform 0.4s cubic-bezier(0.15, 0.85, 0.35, 1);
        }
        .modal-scroll-area { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }

        /* 記帳對齊 Grid */
        .expense-grid { display: grid; grid-template-columns: repeat(12, 1fr); align-items: center; width: 100%; gap: 8px; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        input { font-size: 16px !important; }
    </style>
</head>
<body x-data="travelApp()" x-init="initApp()" 
    @scroll.window.throttle.10ms="syncStatus()"
    @touchstart="touchStartX = $event.touches[0].clientX"
    @touchend="handleSwipe($event.changedTouches[0].clientX)">

    <!-- TAB 1: 行程主頁 -->
    <div x-show="activeTab === 'itinerary'" x-cloak>
        <header class="pt-14 px-8 text-center sticky top-0 bg-[#F9F7F2]/95 backdrop-blur-md z-[50]">
            <h1 class="serif text-xl font-black mb-4 tracking-tighter">日本櫻花自駕之旅 2026</h1>
            <div class="flex overflow-x-auto space-x-3 py-2 no-scrollbar">
                <template x-for="(day, index) in itinerary" :key="index">
                    <div @click="changeDay(index)" class="min-w-[48px] h-[48px] rounded-xl flex flex-col items-center justify-center cursor-pointer transition-all" :class="currentDay === index ? 'bg-white shadow-sm font-bold border border-gray-100' : 'opacity-20'">
                        <span class="text-[8px] uppercase font-black" x-text="day.week"></span>
                        <span class="text-base serif font-black" x-text="day.dateNum"></span>
                    </div>
                </template>
            </div>
        </header>

        <!-- 天氣 -->
        <div class="mx-8 my-5 px-5 py-4 bg-white/60 rounded-2xl flex justify-between items-center border border-white active:scale-95 transition-transform" 
             @click="openWeather(itinerary[currentDay]?.city ?? 'Japan')">
            <div class="flex items-center text-[10px] font-black uppercase">
                <i class="fas fa-location-dot mr-2 text-[#8E2D4F]"></i>
                <span x-text="itinerary[currentDay]?.city ?? ''"></span>
            </div>
            <div class="flex items-center text-orange-600 font-black">
                <span class="text-xs mr-3" x-text="itinerary[currentDay]?.weatherLabel ?? ''"></span>
                <span class="serif text-sm mr-2" x-text="itinerary[currentDay]?.temp ?? ''"></span>
                <i class="fas fa-external-link-alt text-[9px] opacity-20"></i>
            </div>
        </div>

        <main class="relative px-8 pt-6 pb-96">
            <div class="timeline-line"></div>
            <template x-for="(event, eIdx) in itinerary[currentDay]?.events ?? []" :key="eIdx">
                <div :id="'event-'+eIdx" class="event-card js-event-item" :class="activeEventIndex === eIdx ? 'is-active' : ''" @click="openEvent(event)">
                    <div class="event-time serif font-black"><span x-text="event.time ?? ''"></span>°</div>
                    <div class="flex items-center space-x-2 mb-1.5"><span class="text-[8px] font-black opacity-30 uppercase tracking-widest" x-text="event.type ?? ''"></span></div>
                    <h4 class="serif text-base leading-tight mb-1.5 font-black text-[#2D2424]" x-text="event.title ?? ''"></h4>
                    <p class="text-[10px] opacity-60 line-clamp-2 leading-relaxed" x-html="event.desc ?? ''"></p>
                    <template x-if="event.must">
                        <div class="mt-2 flex items-center">
                            <span class="bg-[#8E2D4F] text-white px-1.5 py-0.5 rounded text-[9px] font-black mr-2">必吃/必遊</span>
                            <span class="text-[10px] font-black text-[#8E2D4F]" x-text="event.must ?? ''"></span>
                        </div>
                    </template>
                </div>
            </template>
        </main>

        <!-- 懸浮同步狀態欄 (防 undefined 加固) -->
        <template x-if="itinerary[currentDay]?.events?.[activeEventIndex]">
            <div class="floating-status shadow-2xl" @click="openCurrentEvent()">
                <div class="pr-4 border-r border-gray-100 flex items-center"><i class="fas fa-compass text-[#8E2D4F] text-xl"></i></div>
                <div class="flex-1 px-4 overflow-hidden">
                    <div class="flex items-center space-x-2 mb-0.5">
                        <span class="text-xl font-black serif" x-text="itinerary[currentDay].events[activeEventIndex].time ?? ''"></span>
                        <span class="text-[8px] font-black text-blue-500 uppercase tracking-widest">LIVE</span>
                    </div>
                    <div class="text-[12px] font-black truncate serif opacity-70" x-text="itinerary[currentDay].events[activeEventIndex].title ?? ''"></div>
                </div>
                <i class="fas fa-chevron-right text-gray-200 text-xs"></i>
            </div>
        </template>
    </div>

    <!-- TAB 2: 記帳 -->
    <div x-show="activeTab === 'expenses'" class="min-h-screen pb-60 px-8 pt-16" x-cloak>
        <h2 class="serif text-3xl font-black mb-6">旅遊預算記帳</h2>
        <div class="bg-[#2D2424] text-white rounded-[32px] p-8 mb-8 shadow-xl">
            <p class="text-[10px] opacity-40 font-black uppercase tracking-[2px] mb-2">Total Expenditure</p>
            <span class="text-4xl font-black serif tabular-nums">HK$ <span x-text="totalHKD"></span></span>
            <p class="text-[9px] opacity-30 font-bold uppercase mt-3 tracking-widest">1 JPY = <span x-text="rate"></span> HKD</p>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 mb-8">
            <input type="text" x-model="newExpName" placeholder="項目內容" class="w-full bg-transparent px-2 py-3 text-sm font-bold border-b border-gray-50 outline-none mb-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center bg-gray-50 rounded-xl px-4 py-2 flex-1 mr-3">
                    <span class="text-xs font-black opacity-30 mr-2">¥</span>
                    <input type="number" x-model="newExpAmount" placeholder="日元金額" class="w-full bg-transparent text-sm font-black outline-none tabular-nums">
                </div>
                <button @click="addExpense" class="bg-[#8E2D4F] text-white px-6 py-3 rounded-xl font-black text-xs">ADD</button>
            </div>
        </div>

        <div class="expense-grid px-2 mb-4 text-[9px] font-black opacity-20 uppercase tracking-widest">
            <div class="col-span-5">Description</div>
            <div class="col-span-3 text-right">JPY</div>
            <div class="col-span-3 text-right">HKD</div>
            <div class="col-span-1"></div>
        </div>

        <div class="space-y-0">
            <template x-for="(exp, index) in expenses" :key="index">
                <div class="expense-grid py-4 px-2 border-b border-[#F0EBE0]">
                    <div class="col-span-5"><h4 class="font-black text-[13px] truncate text-[#2D2424]" x-text="exp.name"></h4></div>
                    <div class="col-span-3 text-right"><span class="text-[11px] font-bold text-gray-400 tabular-nums" x-text="exp.jpy"></span></div>
                    <div class="col-span-3 text-right"><span class="text-[13px] font-black text-[#8E2D4F] tabular-nums" x-text="(exp.jpy * rate).toFixed(1)"></span></div>
                    <div class="col-span-1 text-right"><button @click="deleteExpense(index)" class="text-red-200"><i class="fas fa-times-circle"></i></button></div>
                </div>
            </template>
        </div>
    </div>

    <!-- TAB 3: 航班 -->
    <div x-show="activeTab === 'flights'" class="p-10 pt-20 pb-48" x-cloak>
        <h2 class="serif text-xl font-black mb-8 text-center uppercase">航班往返資訊</h2>
        <div class="space-y-4">
            <template x-for="f in flights" :key="f.no">
                <div class="bg-white rounded-2xl p-5 border-l-4 border-[#8E2D4F] flex justify-between items-center shadow-xs">
                    <div><span class="text-[8px] opacity-30 block font-black" x-text="f.date"></span><span class="text-xs font-black serif text-[#8E2D4F]" x-text="f.no"></span></div>
                    <div class="flex items-center space-x-6 text-center">
                        <div><h4 class="text-sm font-black serif" x-text="f.from"></h4><p class="text-[8px] opacity-40 font-black" x-text="f.depTime"></p></div>
                        <i class="fas fa-plane text-gray-200 text-xs"></i>
                        <div><h4 class="text-sm font-black serif" x-text="f.to"></h4><p class="text-[8px] opacity-40 font-black" x-text="f.arrTime"></p></div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- 詳情彈窗 -->
    <template x-if="modalOpen"><div class="modal-overlay" @click="modalOpen = false"></div></template>
    <div x-show="modalOpen" x-cloak class="modal-container" :style="'transform: translateY(' + translateY + 'px)'" @touchstart="handleTouchStart($event)" @touchmove="handleTouchMove($event)" @touchend="handleTouchEnd($event)">
        <div class="pt-5 pb-2 w-full flex justify-center bg-white"><div class="w-12 h-1 bg-gray-200 rounded-full"></div></div>
        <div id="modal-scroll" class="modal-scroll-area px-8 pb-16">
            <div class="mt-4 mb-6">
                <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2.5 py-1 rounded uppercase tracking-widest" x-text="activeEvent?.type ?? ''"></span>
                <h2 class="serif text-2xl font-black mt-3 leading-tight text-[#2D2424]" x-text="activeEvent?.title ?? ''"></h2>
            </div>
            <div class="rounded-3xl overflow-hidden h-52 bg-gray-100 mb-6 shadow-inner">
                <iframe width="100%" height="100%" frameborder="0" :src="'https://maps.google.com/maps?q=' + encodeURIComponent(activeEvent?.title ?? '') + '&t=&z=15&ie=UTF8&iwloc=&output=embed'"></iframe>
            </div>
            <div class="bg-[#FDFBFA] rounded-[30px] p-7 mb-8 border border-[#F0E6E1]">
                <div class="flex items-center text-[#8E2D4F] font-black text-[10px] mb-4 uppercase tracking-[4px]"><i class="fas fa-star mr-2"></i> 導遊攻略</div>
                <div class="text-[14px] leading-relaxed text-gray-600 font-medium" x-html="activeEvent?.guide || activeEvent?.desc || ''"></div>
            </div>
            <a :href="'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(activeEvent?.title ?? '')" class="block w-full bg-[#2D2424] text-white text-center py-5 rounded-2xl font-black text-xs shadow-lg mb-12 uppercase tracking-widest">Google Maps 導航</a>
        </div>
    </div>

    <!-- 底部導覽 -->
    <nav class="tab-nav">
        <button @click="activeTab = 'itinerary'" :class="activeTab === 'itinerary' ? 'text-[#8E2D4F]' : 'text-gray-300'"><i class="fas fa-calendar-day text-2xl"></i></button>
        <button @click="activeTab = 'expenses'" :class="activeTab === 'expenses' ? 'text-[#8E2D4F]' : 'text-gray-300'"><i class="fas fa-wallet text-2xl"></i></button>
        <button @click="activeTab = 'flights'" :class="activeTab === 'flights' ? 'text-[#8E2D4F]' : 'text-gray-300'"><i class="fas fa-plane-departure text-2xl"></i></button>
    </nav>

    <script>
        function travelApp() {
            return {
                currentDay: 1, activeTab: 'itinerary', activeEventIndex: 0, modalOpen: false, activeEvent: {},
                expenses: JSON.parse(localStorage.getItem('trip_exp_v29') || '[]'),
                newExpName: '', newExpAmount: '', rate: 0.0515,
                touchStartX: 0, startY: 0, translateY: 0, isDragging: false, modalScrollTop: 0,

                async initApp() {
                    this.$nextTick(() => { this.syncStatus(); });
                    try {
                        const res = await fetch('https://open.er-api.com/v6/latest/JPY');
                        const data = await res.json();
                        if(data.rates.HKD) this.rate = data.rates.HKD.toFixed(4);
                    } catch(e) { console.log('Rate Fetch Error'); }
                },

                syncStatus() {
                    if (this.activeTab !== 'itinerary') return;
                    const trigger = window.innerHeight * 0.35;
                    let targetIdx = 0;
                    const eventElements = document.querySelectorAll('.js-event-item');
                    if (eventElements.length === 0) return;
                    eventElements.forEach((el, i) => {
                        if (el.getBoundingClientRect().top <= trigger) targetIdx = i;
                    });
                    this.activeEventIndex = targetIdx;
                },

                handleSwipe(endX) {
                    if (this.activeTab !== 'itinerary' || this.modalOpen) return;
                    const diff = this.touchStartX - endX;
                    if (Math.abs(diff) > 80) {
                        if (diff > 0 && this.currentDay < this.itinerary.length - 1) this.changeDay(this.currentDay + 1);
                        else if (diff < 0 && this.currentDay > 0) this.changeDay(this.currentDay - 1);
                    }
                },

                handleTouchStart(e) {
                    this.modalScrollTop = document.getElementById('modal-scroll')?.scrollTop || 0;
                    this.startY = e.touches[0].clientY;
                    this.isDragging = true;
                },
                handleTouchMove(e) {
                    if (!this.isDragging) return;
                    let delta = e.touches[0].clientY - this.startY;
                    if (this.modalScrollTop <= 0 && delta > 0) { e.preventDefault(); this.translateY = delta; }
                    else { this.translateY = 0; if (delta < 0) this.isDragging = false; }
                },
                handleTouchEnd() {
                    if (this.translateY > 120) this.modalOpen = false;
                    this.isDragging = false; this.translateY = 0;
                },

                openWeather(city) {
                    window.open(`https://www.accuweather.com/zh/search-locations?query=${encodeURIComponent(city + ' Japan')}`, '_blank');
                },

                changeDay(idx) { 
                    this.currentDay = idx; 
                    this.activeEventIndex = 0; 
                    window.scrollTo({ top: 0, behavior: 'instant' }); 
                    this.$nextTick(() => { this.syncStatus(); }); 
                },
                openEvent(e) { this.activeEvent = e; this.modalOpen = true; },
                openCurrentEvent() { 
                    const ev = this.itinerary[this.currentDay]?.events?.[this.activeEventIndex];
                    if(ev) { this.activeEvent = ev; this.modalOpen = true; }
                },
                
                addExpense() {
                    if(!this.newExpName || !this.newExpAmount) return;
                    this.expenses.unshift({ name: this.newExpName, jpy: parseFloat(this.newExpAmount) });
                    this.newExpName = ''; this.newExpAmount = '';
                    localStorage.setItem('trip_exp_v29', JSON.stringify(this.expenses));
                },
                deleteExpense(i) { this.expenses.splice(i, 1); localStorage.setItem('trip_exp_v29', JSON.stringify(this.expenses)); },
                get totalHKD() { return this.expenses.reduce((sum, item) => sum + (item.jpy * this.rate), 0).toFixed(1); },

                flights: [
                    { no: 'NH1914', date: '28 MAR', from: 'HKG', to: 'HND', depTime: '23:55', arrTime: '04:55' },
                    { no: 'NH531', date: '29 MAR', from: 'HND', to: 'TAK', depTime: '06:55', arrTime: '08:10' },
                    { no: 'NH540', date: '05 APR', from: 'TAK', to: 'HND', depTime: '19:40', arrTime: '21:00' },
                    { no: 'NH813', date: '07 APR', from: 'HND', to: 'HKG', depTime: '01:35', arrTime: '05:15' }
                ],

                itinerary: [
                    { dateNum: '28', week: 'SAT', city: '香港 ➜ 羽田', weatherLabel: '多雲', temp: '12-18°C', events: [{ time: '23:55', type: 'Flight', title: '全日空 NH1914', desc: '啟程飛往東京羽田。', guide: '', must: '' }]},
                    { dateNum: '29', week: 'SUN', city: '高松 ➜ 仁淀川', weatherLabel: '晴', temp: '15-22°C', events: [
                        { time: '06:55', type: 'Flight', title: '全日空 NH531 (國內線)', desc: '飛往高松。', guide: '', must: '' },
                        { time: '08:00', type: 'Car', title: 'Toyota rent a car (Tak)', desc: '辦理取車。', guide: '<b>預約番號 98172536000</b>。', must: '' },
                        { time: '12:00', type: 'Food', title: '西村商店 (道の駅佐川店)', desc: '在地美食。', must: '炙燒鰹魚', guide: '' },
                        { time: '13:20', type: 'Spot', title: '仁淀川 Crystal Kayak', desc: '透明獨木舟。', guide: '<b>1:20pm 預約</b>。', must: '' },
                        { time: '15:30', type: 'Spot', title: '上久喜、久喜、引地橋花桃', desc: '賞花聖地。', must: '三大花桃絕景', guide: '' },
                        { time: '16:30', type: 'Spot', title: 'ひょうたん桜公園', desc: '老櫻花名所。', guide: '', must: '' },
                        { time: '19:00', type: 'Hotel', title: '星ふるヴィレッジ TENGU', desc: '山頂住宿。', guide: 'CI 5pm。觀星名店。', must: '' }
                    ]},
                    { dateNum: '30', week: 'MON', city: '天狗高原 ➜ 檮原', weatherLabel: '晴', temp: '13-20°C', events: [
                        { time: '10:00', type: 'Spot', title: '天狗高原 & 白龍湖', desc: '自然景觀。', guide: '', must: '' },
                        { time: '11:00', type: 'Spot', title: '檮原町 (隈研吾建築群)', desc: '木造巡禮。', must: '雲之上圖書館', guide: '' },
                        { time: '12:30', type: 'Food', title: 'Lunch: かざぐるま / くさぶき', desc: '午餐點。', guide: '', must: '' },
                        { time: '16:00', type: 'Spot', title: '岩本寺 Supermarket', desc: '補給。', guide: '<b>⚠️ 9:00pm 關門</b>。', must: '' },
                        { time: '19:30', type: 'Hotel', title: '岩本寺 (宿坊)', desc: '寺廟住宿。', guide: '', must: '' }
                    ]},
                    { dateNum: '31', week: 'TUE', city: '四萬十 ➜ 高知', weatherLabel: '晴', temp: '14-23°C', events: [
                        { time: '12:30', type: 'Food', title: '自由軒 本店', desc: '拉麵。', must: '味噌拉麵', guide: '' },
                        { time: '15:30', type: 'Food', title: '茶農家的店 あすなろ', desc: '茶甜點。', must: '茶點心', guide: '<b>⚠️ L.O. 3:30pm</b>。' },
                        { time: '19:30', type: 'Hotel', title: '瀧乃元 近藤家', desc: '精緻旅館。', guide: '', must: '' }
                    ]},
                    { dateNum: '01', week: 'WED', city: '松山 ➜ 道後', weatherLabel: '晴', temp: '14-21°C', events: [
                        { time: '11:30', type: 'Spot', title: 'ハタダできたてお菓子館', desc: '甜點。', must: '栗子捲', guide: '' },
                        { time: '16:30', type: 'Spot', title: '道後溫泉散策', desc: '溫泉街。', guide: '神隱少女氛圍。', must: '' },
                        { time: '19:30', type: 'Hotel', title: '山の手別邸 葉隱', desc: '飯店住宿。', guide: '', must: '' }
                    ]},
                    { dateNum: '02', week: 'THU', city: '雲邊寺 ➜ 香川', weatherLabel: '多雲', temp: '12-20°C', events: [
                        { time: '12:00', type: 'Spot', title: '雲邊寺山頂公園', desc: '鞦韆景點。', must: '天空鞦韆', guide: '' },
                        { time: '16:30', type: 'Spot', title: '紫雲出山 (集合)', desc: '櫻花絕景。', must: '16:30 報到', guide: '<b>⚠️ 集合點：大濱漁港</b>。' },
                        { time: '20:00', type: 'Food', title: 'すし遊館あさひ 善通寺店', desc: '壽司。', must: '', guide: '' },
                        { time: '22:00', type: 'Hotel', title: 'Guesthouse Ihatov', desc: '住宿。', guide: '', must: '' }
