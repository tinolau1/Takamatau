<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>日本櫻花自駕之旅 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        :root { 
            --bg-cream: #F9F7F2; 
            --accent-red: #8E2D4F; 
            --text-main: #2D2424;
            font-size: 17.6px; /* 110% 放大字體 */
        }
        body { background-color: var(--bg-cream); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; overflow-x: hidden; }
        .serif { font-family: 'Noto Serif JP', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 行程線條 */
        .timeline-line { position: absolute; left: 55px; top: 0; bottom: 0; width: 1.5px; background: #E5E1D8; z-index: 0; }
        .event-card { position: relative; z-index: 10; padding-left: 75px; margin-bottom: 80px; transition: all 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); opacity: 0.15; transform: scale(0.96); }
        .event-card.is-active { opacity: 1; transform: scale(1); }
        .event-time { position: absolute; left: 0; width: 50px; text-align: right; font-size: 1.1rem; font-weight: 900; color: #ccc; transition: 0.3s; }
        .is-active .event-time { color: var(--accent-red); font-size: 1.4rem; }

        /* 懸浮狀態列 */
        .floating-status { 
            position: fixed; bottom: calc(110px + env(safe-area-inset-bottom)); left: 16px; right: 16px; 
            background: rgba(255,255,255,0.98); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-radius: 28px; box-shadow: 0 15px 45px rgba(0,0,0,0.12); 
            display: flex; align-items: center; padding: 18px 24px; z-index: 999; border: 0.5px solid rgba(0,0,0,0.05);
        }

        /* 底部導覽 */
        .tab-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 0.5px solid #eee; display: flex; justify-content: space-around; padding: 16px 0 calc(20px + env(safe-area-inset-bottom)); z-index: 1001; }
        
        /* 詳情彈窗 */
        .modal-container { 
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000;
            background: white; border-top-left-radius: 45px; border-top-right-radius: 45px;
            max-height: 94vh; overflow: hidden; display: flex; flex-direction: column;
            will-change: transform; transition: transform 0.4s cubic-bezier(0.15, 0.85, 0.35, 1);
        }
        .guide-text { font-size: 1rem; line-height: 1.8; color: #555; }
        .guide-text b { color: var(--accent-red); font-weight: 800; }
        input { font-size: 1rem !important; }
    </style>
</head>
<body x-data="travelApp()" x-init="initApp()" 
    @scroll.window.throttle.10ms="syncStatus()"
    @touchstart="touchStartX = $event.touches[0].clientX"
    @touchend="handleSwipe($event.changedTouches[0].clientX)">

    <!-- TAB 1: 行程主頁 -->
    <div x-show="activeTab === 'itinerary'" x-cloak>
        <header class="pt-14 px-8 text-center sticky top-0 bg-[#F9F7F2]/95 backdrop-blur-md z-[50]">
            <h1 class="serif text-2xl font-black mb-5 tracking-tighter uppercase">日本櫻花自駕之旅 2026</h1>
            <div class="flex overflow-x-auto space-x-4 py-3 no-scrollbar">
                <template x-for="(day, index) in itinerary" :key="index">
                    <div @click="changeDay(index)" class="min-w-[55px] h-[55px] rounded-2xl flex flex-col items-center justify-center cursor-pointer transition-all" :class="currentDay === index ? 'bg-white shadow-md font-bold border border-gray-100' : 'opacity-20'">
                        <span class="text-[10px] uppercase font-black" x-text="day.week"></span>
                        <span class="text-xl serif font-black" x-text="day.dateNum"></span>
                    </div>
                </template>
            </div>
        </header>

        <!-- 當天天氣 -->
        <div class="mx-8 my-6 px-6 py-5 bg-white/60 rounded-[28px] flex justify-between items-center border border-white shadow-sm active:scale-95 transition-transform" 
             @click="openWeather(itinerary[currentDay]?.city ?? 'Japan')">
            <div class="flex items-center text-[11px] font-black uppercase tracking-widest">
                <i class="fas fa-location-dot mr-2 text-[#8E2D4F]"></i>
                <span x-text="itinerary[currentDay]?.city ?? ''"></span>
            </div>
            <div class="flex items-center text-orange-600 font-black">
                <span class="text-[13px] mr-3" x-text="itinerary[currentDay]?.weatherLabel ?? ''"></span>
                <span class="serif text-lg mr-2" x-text="itinerary[currentDay]?.temp ?? ''"></span>
                <i class="fas fa-external-link-alt text-[10px] opacity-20"></i>
            </div>
        </div>

        <main class="relative px-8 pt-6 pb-96">
            <div class="timeline-line"></div>
            <template x-for="(event, eIdx) in itinerary[currentDay]?.events ?? []" :key="eIdx">
                <div :id="'event-'+eIdx" class="event-card js-event-item" :class="activeEventIndex === eIdx ? 'is-active' : ''" @click="openEvent(event)">
                    <div class="event-time serif font-black"><span x-text="event.time ?? ''"></span>°</div>
                    <div class="flex items-center space-x-2 mb-2">
                        <span class="text-[9px] font-black opacity-30 uppercase tracking-[2px]" x-text="event.type ?? ''"></span>
                    </div>
                    <h4 class="serif text-lg leading-snug mb-2 font-black text-[#2D2424]" x-text="event.title ?? ''"></h4>
                    <p class="text-[12px] opacity-60 line-clamp-2 leading-relaxed" x-html="event.desc ?? ''"></p>
                    <template x-if="event.must">
                        <div class="mt-3 flex items-center">
                            <span class="bg-[#8E2D4F] text-white px-2 py-0.5 rounded-lg text-[10px] font-black mr-2 uppercase tracking-tighter">Guide</span>
                            <span class="text-[12px] font-black text-[#8E2D4F]" x-text="event.must ?? ''"></span>
                        </div>
                    </template>
                </div>
            </template>
        </main>

        <!-- 懸浮同步狀態欄 -->
        <template x-if="itinerary[currentDay]?.events?.[activeEventIndex]">
            <div class="floating-status shadow-2xl" @click="openCurrentEvent()">
                <div class="pr-5 border-r border-gray-100 flex items-center"><i class="fas fa-compass text-[#8E2D4F] text-2xl"></i></div>
                <div class="flex-1 px-5 overflow-hidden">
                    <div class="flex items-center space-x-2 mb-0.5">
                        <span class="text-2xl font-black serif" x-text="itinerary[currentDay].events[activeEventIndex].time ?? ''"></span>
                        <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">CURRENT</span>
                    </div>
                    <div class="text-[14px] font-black truncate serif opacity-70" x-text="itinerary[currentDay].events[activeEventIndex].title ?? ''"></div>
                </div>
                <i class="fas fa-chevron-right text-gray-200 text-sm"></i>
            </div>
        </template>
    </div>

    <!-- TAB 2: 記帳 -->
    <div x-show="activeTab === 'expenses'" class="min-h-screen pb-60 px-8 pt-16" x-cloak>
        <h2 class="serif text-3xl font-black mb-8">旅費計算</h2>
        <div class="bg-[#2D2424] text-white rounded-[35px] p-9 mb-9 shadow-2xl">
            <p class="text-[11px] opacity-40 font-black uppercase tracking-[3px] mb-3">Total Used</p>
            <span class="text-4xl font-black serif tabular-nums">HK$ <span x-text="totalHKD"></span></span>
            <p class="text-[10px] opacity-30 font-bold uppercase mt-4 tracking-widest">1 JPY = <span x-text="rate"></span> HKD</p>
        </div>

        <div class="bg-white rounded-[25px] p-5 shadow-sm border border-gray-100 mb-9">
            <input type="text" x-model="newExpName" placeholder="項目" class="w-full bg-transparent px-3 py-4 text-base font-bold border-b border-gray-50 outline-none mb-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center bg-gray-50 rounded-2xl px-5 py-3 flex-1 mr-4">
                    <span class="text-sm font-black opacity-30 mr-2">¥</span>
                    <input type="number" x-model="newExpAmount" placeholder="金額" class="w-full bg-transparent text-base font-black outline-none tabular-nums">
                </div>
                <button @click="addExpense" class="bg-[#8E2D4F] text-white px-8 py-4 rounded-2xl font-black text-sm active:scale-90 transition-transform">ADD</button>
            </div>
        </div>

        <div class="expense-grid px-3 mb-5 text-[10px] font-black opacity-20 uppercase tracking-[2px]">
            <div class="col-span-5">Desc</div>
            <div class="col-span-3 text-right">JPY</div>
            <div class="col-span-3 text-right">HKD</div>
            <div class="col-span-1"></div>
        </div>

        <div class="space-y-1">
            <template x-for="(exp, index) in expenses" :key="index">
                <div class="expense-grid py-5 px-3 border-b border-[#F0EBE0]">
                    <div class="col-span-5"><h4 class="font-black text-[15px] truncate text-[#2D2424]" x-text="exp.name"></h4></div>
                    <div class="col-span-3 text-right"><span class="text-[13px] font-bold text-gray-400 tabular-nums" x-text="exp.jpy"></span></div>
                    <div class="col-span-3 text-right"><span class="text-[15px] font-black text-[#8E2D4F] tabular-nums" x-text="(exp.jpy * rate).toFixed(1)"></span></div>
                    <div class="col-span-1 text-right"><button @click="deleteExpense(index)" class="text-red-200"><i class="fas fa-times-circle text-lg"></i></button></div>
                </div>
            </template>
        </div>
    </div>

    <!-- TAB 3: 航班 -->
    <div x-show="activeTab === 'flights'" class="p-10 pt-24 pb-48" x-cloak>
        <h2 class="serif text-2xl font-black mb-10 text-center uppercase tracking-widest">Flight Info</h2>
        <div class="space-y-5">
            <template x-for="f in flights" :key="f.no">
                <div class="bg-white rounded-[30px] p-7 border-l-[6px] border-[#8E2D4F] flex justify-between items-center shadow-sm">
                    <div><span class="text-[10px] opacity-30 block font-black mb-1 uppercase tracking-widest" x-text="f.date"></span><span class="text-lg font-black serif text-[#8E2D4F]" x-text="f.no"></span></div>
                    <div class="flex items-center space-x-7 text-center">
                        <div><h4 class="text-lg font-black serif" x-text="f.from"></h4><p class="text-[10px] opacity-40 font-black" x-text="f.depTime"></p></div>
                        <i class="fas fa-plane text-gray-200 text-sm"></i>
                        <div><h4 class="text-lg font-black serif" x-text="f.to"></h4><p class="text-[10px] opacity-40 font-black" x-text="f.arrTime"></p></div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- 詳情彈窗 -->
    <template x-if="modalOpen"><div class="modal-overlay" @click="modalOpen = false"></div></template>
    <div x-show="modalOpen" x-cloak class="modal-container" :style="'transform: translateY(' + translateY + 'px)'" @touchstart="handleTouchStart($event)" @touchmove="handleTouchMove($event)" @touchend="handleTouchEnd($event)">
        <div class="pt-6 pb-3 w-full flex justify-center bg-white"><div class="w-14 h-1.5 bg-gray-200 rounded-full"></div></div>
        <div id="modal-scroll" class="modal-scroll-area px-10 pb-20">
            <div class="mt-5 mb-7">
                <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg uppercase tracking-widest" x-text="activeEvent?.type ?? ''"></span>
                <h2 class="serif text-3xl font-black mt-4 leading-tight text-[#2D2424]" x-text="activeEvent?.title ?? ''"></h2>
            </div>
            <div class="rounded-[35px] overflow-hidden h-60 bg-gray-100 mb-8 shadow-inner border border-gray-50">
                <iframe width="100%" height="100%" frameborder="0" :src="'https://maps.google.com/maps?q=' + encodeURIComponent(activeEvent?.title ?? '') + '&t=&z=15&ie=UTF8&iwloc=&output=embed'"></iframe>
            </div>
            <div class="bg-[#FDFBFA] rounded-[35px] p-8 mb-10 border border-[#F0E6E1] shadow-sm">
                <div class="flex items-center text-[#8E2D4F] font-black text-[11px] mb-5 uppercase tracking-[5px]"><i class="fas fa-map-location-dot mr-3"></i> 導遊攻略</div>
                <div class="guide-text" x-html="activeEvent?.guide ?? activeEvent?.desc ?? ''"></div>
            </div>
            <a :href="'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(activeEvent?.title ?? '')" class="block w-full bg-[#2D2424] text-white text-center py-6 rounded-[22px] font-black text-sm active:scale-95 transition-transform mb-14 uppercase tracking-[4px]">Google Maps 導覽</a>
        </div>
    </div>

    <!-- 底部導覽 -->
    <nav class="tab-nav">
        <button @click="activeTab = 'itinerary'" :class="activeTab === 'itinerary' ? 'text-[#8E2D4F]' : 'text-gray-300'"><i class="fas fa-calendar-day text-3xl"></i></button>
        <button @click="activeTab = 'expenses'" :class="activeTab === 'expenses' ? 'text-[#8E2D4F]' : 'text-gray-300'"><i class="fas fa-wallet text-3xl"></i></button>
        <button @click="activeTab = 'flights'" :class="activeTab === 'flights' ? 'text-[#8E2D4F]' : 'text-gray-300'"><i class="fas fa-plane-departure text-3xl"></i></button>
    </nav>

    <script>
        function travelApp() {
            return {
                currentDay: 1, activeTab: 'itinerary', activeEventIndex: 0, modalOpen: false, activeEvent: {},
                expenses: JSON.parse(localStorage.getItem('trip_exp_v34') || '[]'),
                newExpName: '', newExpAmount: '', rate: 0.0515,
                touchStartX: 0, startY: 0, translateY: 0, isDragging: false, modalScrollTop: 0,

                async initApp() {
                    this.$nextTick(() => { this.syncStatus(); });
                    try {
                        const res = await fetch('https://open.er-api.com/v6/latest/JPY');
                        const data = await res.json();
                        if(data.rates.HKD) this.rate = data.rates.HKD.toFixed(4);
                    } catch(e) { console.log('Rate Load Error'); }
                },

                syncStatus() {
                    if (this.activeTab !== 'itinerary') return;
                    const trigger = window.innerHeight * 0.35;
                    let targetIdx = 0;
                    const eventElements = document.querySelectorAll('.js-event-item');
                    if (eventElements.length === 0) return;
                    eventElements.forEach((el, i) => {
                        if (el.getBoundingClientRect().top <= trigger) targetIdx = i;
                    });
                    this.activeEventIndex = targetIdx;
                },

                handleSwipe(endX) {
                    if (this.activeTab !== 'itinerary' || this.modalOpen) return;
                    const diff = this.touchStartX - endX;
                    if (Math.abs(diff) > 80) {
                        if (diff > 0 && this.currentDay < this.itinerary.length - 1) this.changeDay(this.currentDay + 1);
                        else if (diff < 0 && this.currentDay > 0) this.changeDay(this.currentDay - 1);
                    }
                },

                handleTouchStart(e) {
                    this.modalScrollTop = document.getElementById('modal-scroll')?.scrollTop || 0;
                    this.startY = e.touches[0].clientY;
                    this.isDragging = true;
                },
                handleTouchMove(e) {
                    if (!this.isDragging) return;
                    let delta = e.touches[0].clientY - this.startY;
                    if (this.modalScrollTop <= 0 && delta > 0) { e.preventDefault(); this.translateY = delta; }
                    else { this.translateY = 0; if (delta < 0) this.isDragging = false; }
                },
                handleTouchEnd() {
                    if (this.translateY > 120) this.modalOpen = false;
                    this.isDragging = false; this.translateY = 0;
                },

                openWeather(city) { window.open(`https://www.accuweather.com/zh/search-locations?query=${encodeURIComponent(city + ' Japan')}`, '_blank'); },

                changeDay(idx) { 
                    this.currentDay = idx; this.activeEventIndex = 0; 
                    window.scrollTo({ top: 0, behavior: 'instant' }); 
                    this.$nextTick(() => { this.syncStatus(); }); 
                },
                openEvent(e) { this.activeEvent = e; this.modalOpen = true; },
                openCurrentEvent() { 
                    const ev = this.itinerary[this.currentDay]?.events?.[this.activeEventIndex];
                    if(ev) { this.activeEvent = ev; this.modalOpen = true; }
                },
                
                addExpense() {
                    if(!this.newExpName || !this.newExpAmount) return;
                    this.expenses.unshift({ name: this.newExpName, jpy: parseFloat(this.newExpAmount) });
                    this.newExpName = ''; this.newExpAmount = '';
                    localStorage.setItem('trip_exp_v34', JSON.stringify(this.expenses));
                },
                deleteExpense(i) { this.expenses.splice(i, 1); localStorage.setItem('trip_exp_v34', JSON.stringify(this.expenses)); },
                get totalHKD() { return this.expenses.reduce((sum, item) => sum + (item.jpy * this.rate), 0).toFixed(1); },

                flights: [
                    { no: 'NH1914', date: '28 MAR', from: 'HKG', to: 'HND', depTime: '23:55', arrTime: '04:55' },
                    { no: 'NH531', date: '29 MAR', from: 'HND', to: 'TAK', depTime: '06:55', arrTime: '08:10' },
                    { no: 'NH540', date: '05 APR', from: 'TAK', to: 'HND', depTime: '19:40', arrTime: '21:00' },
                    { no: 'NH813', date: '07 APR', from: 'HND', to: 'HKG', depTime: '01:35', arrTime: '05:15' }
                ],

                itinerary: [
                    { dateNum: '28', week: 'SAT', city: '香港 ➜ 羽田', weatherLabel: '多雲', temp: '12-18°C', events: [{ time: '23:55', type: 'Flight', title: '全日空 NH1914', desc: '啟程直飛羽田。', guide: '香港機場出發，建議提前 3 小時到達。抵達後請跟隨「國內線轉機」指示。', must: '' }]},
                    { dateNum: '29', week: 'SUN', city: '高松 ➜ 仁淀川', weatherLabel: '晴', temp: '15-22°C', events: [
                        { time: '08:00', type: 'Car', title: 'Toyota rent a car (TAK)', guide: '<b>預約番號 98172536000</b>。取車時請檢查 ETC 卡是否已插入。從機場開往仁淀川約需 2.5-3 小時。', must: '' },
                        { time: '12:00', type: 'Food', title: '西村商店 (佐川店)', must: '炙燒鰹魚定食', guide: '位於道の駅內，鰹魚是高知靈魂美食。記得淋上特製橙醋，風味更佳。' },
                        { time: '13:20', type: 'Spot', title: '仁淀川 Crystal Kayak', guide: '<b>1:20pm 預約</b>。水晶獨木舟，可以看清 10 米深的水底。這裏被稱為「仁淀藍」，透明度全日第一。', must: '水晶獨木舟體驗' },
                        { time: '15:30', type: 'Spot', title: '上久喜、久喜、引地橋花桃', must: '桃源鄉絕景', guide: '這一帶是著名的「花桃之路」，三處地點連成一線。櫻花以外的粉色隧道，震撼程度毫不遜色。' },
                        { time: '16:30', type: 'Spot', title: 'ひょうたん桜公園', guide: '樹齡超過 500 年的巨型古櫻，因花苞形似葫蘆而得名。是當地的天然紀念物。', must: '' },
                        { time: '19:00', type: 'Hotel', title: '星ふるヴィレッジ TENGU', guide: 'CI 5pm。山頂無光害區，晚上 9 點後有星空觀賞會。<b>山路入夜後完全無燈，建議及早到達 Check-in</b>。', must: '' }
                    ]},
                    { dateNum: '30', week: 'MON', city: '天狗高原 ➜ 檮原', weatherLabel: '晴', temp: '13-20°C', events: [
                        { time: '08:00', type: 'Food', title: 'Breakfast at hotel', guide: '餐廳面向喀斯特高原景觀，早餐非常豐富，伴隨晨曦與牛隻放牧。', must: '' },
                        { time: '10:00', type: 'Spot', title: '天狗高原 & 白龍湖', guide: '橫跨高知與愛媛的喀斯特地形，如置身瑞士山區。<b>白龍湖</b>湖水呈翡翠色，神秘幽靜。', must: '' },
                        { time: '11:00', type: 'Spot', title: '檮原町 (建築巡禮)', must: '雲之上圖書館', guide: '隈研吾在四國的靈感源點。必看 <b>雲之上圖書館</b> 及 <b>檮原座</b>。木造結構展示極致日本美學。' },
                        { time: '12:30', type: 'Food', title: 'Lunch: かざぐるま / くさぶき', guide: '兩家皆主打在地農家料理。推薦冷蕎麥麵搭配山菜天婦羅。', must: '' },
                        { time: '16:00', type: 'Spot', title: '岩本寺 Supermarket', guide: '<b>⚠️ 9:00pm 關門</b>。宿坊周邊餐廳較早關閉，建議買好宵夜與飲品。', must: '' },
                        { time: '19:30', type: 'Hotel', title: '岩本寺 (宿坊住宿)', guide: '四國遍路靈場。天花板 575 幅彩色天井畫極其壯觀，晚上的寺廟氛圍肅穆優美。', must: '' }
                    ]},
                    { dateNum: '31', week: 'TUE', city: '四萬十 ➜ 高知', weatherLabel: '晴', temp: '14-23°C', events: [
                        { time: '08:30', type: 'Food', title: 'Breakfast: Sotoffice', guide: '位於四萬十川畔，氣氛極佳的摩登早餐店。', must: '' },
                        { time: '10:00', type: 'Spot', title: '四万十町散策', guide: '沈下橋巡禮。必看 <b>佐田沈下橋</b>。沈下橋為適應河水上漲而設計，沒有護欄，走在橋上感受清流震撼。', must: '日本最後的清流' },
